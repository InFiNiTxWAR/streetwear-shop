<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produtos - NovaStore</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>



<header>

<div class="logo">
<a href="index.html">🛍 NovaStore</a>
</div>

<input
type="text"
placeholder="Buscar produto..."
id="search"
class="search-bar"
>

<nav>
<a href="index.html">Home</a>
<a href="produtos.html">Produtos</a>
<a href="contato.html">Contato</a>
</nav>

</header>




<section class="produtos-page">

<h1>Todos os Produtos</h1>

<div class="product-grid" id="product-grid"></div>

</section>




<div class="modal" id="product-modal">

<div class="modal-content">

<span class="close" id="close-modal">✖</span>

<div class="modal-grid">

<img id="modal-img">

<div class="modal-info">

<h2 id="modal-title"></h2>

<p id="modal-desc"></p>

<div class="price-area">

<p>Preço: <span id="modal-price"></span></p>

<p>ICMS: <span id="modal-icms"></span></p>

<p>Frete: <span id="modal-frete"></span></p>

<p>Envio: Sedex / 3 dias úteis</p>

</div>

<input
type="text"
placeholder="Cupom de desconto"
id="cupom"
/>

<button id="apply-coupon">
Aplicar cupom
</button>

<h3 id="final-price"></h3>

<button class="buy-now" id="buy-now">
Comprar agora
</button>

</div>

</div>

</div>

</div>


<script>

const grid = document.getElementById("product-grid")
const modal = document.getElementById("product-modal")

let produtoSelecionado = null

/* busca do produton pela api */

fetch("https://fakestoreapi.com/products")

.then(res => res.json())

.then(produtos => {

produtos.forEach(produto => {

const card = document.createElement("div")

card.className = "product-card"

card.innerHTML = `

<img src="${produto.image}">

<h3>${produto.title}</h3>

<span>R$ ${produto.price}</span>

<button class="buy-btn">
Ver produto
</button>

`

card.onclick = () => abrirProduto(produto)

grid.appendChild(card)

})

})




function abrirProduto(produto){

produtoSelecionado = produto

modal.style.display = "flex"

const icms = produto.price * 0.17
const frete = 20
const total = produto.price + icms + frete

document.getElementById("modal-img").src = produto.image
document.getElementById("modal-title").innerText = produto.title
document.getElementById("modal-desc").innerText = produto.description

document.getElementById("modal-price").innerText =
"R$ " + produto.price.toFixed(2)

document.getElementById("modal-icms").innerText =
"R$ " + icms.toFixed(2)

document.getElementById("modal-frete").innerText =
"R$ " + frete.toFixed(2)

document.getElementById("final-price").innerText =
"Total: R$ " + total.toFixed(2)

}




document.getElementById("close-modal").onclick = () => {

modal.style.display = "none"

}




document.getElementById("apply-coupon").onclick = () => {

const cupom = document.getElementById("cupom").value

if(cupom === "NOVA10"){

const desconto = produtoSelecionado.price * 0.10
const novoPreco = produtoSelecionado.price - desconto

document.getElementById("final-price").innerText =
"Total com desconto: R$ " + novoPreco.toFixed(2)

}

}



document.getElementById("buy-now").onclick = () => {

let carrinho =
JSON.parse(localStorage.getItem("carrinho")) || []

carrinho.push({

nome:produtoSelecionado.title,
preco:produtoSelecionado.price,
imagem:produtoSelecionado.image

})

localStorage.setItem("carrinho", JSON.stringify(carrinho))

window.location.href = "checkout.html"

}




document.getElementById("search").addEventListener("keyup", function(){

const termo = this.value.toLowerCase()

const cards = document.querySelectorAll(".product-card")

cards.forEach(card => {

const texto = card.innerText.toLowerCase()

card.style.display =
texto.includes(termo) ? "block" : "none"

})

})

</script>

</body>

</html>
